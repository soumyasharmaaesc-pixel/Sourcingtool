// CORS proxies — try multiple to maximize reliability
var CORS_PROXIES = [
  function(url) { return "https://api.allorigins.win/raw?url=" + encodeURIComponent(url); },
  function(url) { return "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(url); },
  function(url) { return "https://corsproxy.io/?" + encodeURIComponent(url); }
];

// Scrape a Google search results page via CORS proxy and extract LinkedIn profiles
async function scrapeGoogleXRay(query, progressCallback) {
  var googleUrl = "https://www.google.com/search?q=" + encodeURIComponent(query) + "&num=20";
  var html = null;

  // Try each proxy until one works
  for (var pi = 0; pi < CORS_PROXIES.length; pi++) {
    try {
      var proxyUrl = CORS_PROXIES[pi](googleUrl);
      if (progressCallback) progressCallback("Trying proxy " + (pi + 1) + "/" + CORS_PROXIES.length + "...");
      var resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(12000) });
      if (resp.ok) {
        var text = await resp.text();
        // Verify we got actual Google HTML (not a block page)
        if (text.includes("linkedin.com/in/") && text.length > 5000) {
          html = text;
          break;
        }
      }
    } catch(e) {
      // proxy failed, try next
    }
  }

  if (!html) return [];

  var profiles = [];
  var seenUrls = {};

  // Strategy 1: Parse <a> tags pointing to LinkedIn profiles
  var linkRegex = /href="(https?:\/\/[a-z]{2,3}\.linkedin\.com\/in\/[^"?&]+)/gi;
  var linkMatch;
  while ((linkMatch = linkRegex.exec(html)) !== null) {
    var url = linkMatch[1].split("?")[0].split("&")[0];
    if (!url.endsWith("/")) url += "/";
    if (!seenUrls[url]) { seenUrls[url] = true; profiles.push({ url: url }); }
  }

  // Strategy 2: Loose URL matching for linkedin.com/in/ (catches encoded variants)
  var looseRegex = /https?:\/\/[a-z]{2,3}\.linkedin\.com\/in\/[a-zA-Z0-9_-]+\/?/gi;
  var looseMatch;
  while ((looseMatch = looseRegex.exec(html)) !== null) {
    var lUrl = looseMatch[0].split("?")[0].split("&")[0];
    if (!lUrl.endsWith("/")) lUrl += "/";
    if (!seenUrls[lUrl]) { seenUrls[lUrl] = true; profiles.push({ url: lUrl }); }
  }

  // Now extract titles and snippets from the HTML for each profile
  // Google result blocks typically have <h3> before the link and snippet text after
  var h3Regex = /<h3[^>]*>(.*?)<\/h3>/gi;
  var h3Titles = [];
  var h3m;
  while ((h3m = h3Regex.exec(html)) !== null) {
    h3Titles.push(h3m[1].replace(/<[^>]+>/g, "").trim());
  }

  // Map titles to profiles (same order)
  profiles.forEach(function(p, idx) {
    p.rawTitle = h3Titles[idx] || "";
  });

  return profiles;
}

// Parse a raw Google result into a structured candidate object
function parseGoogleProfileToCandidate(profile, searchParams, searchId, index) {
  var rawTitle = (profile.rawTitle || "").replace(/ \| LinkedIn$/i, "").replace(/ - LinkedIn$/i, "").replace(/\.\.\./g, "").trim();
  var url = profile.url || "";

  // Parse name and title from Google result titles
  // Common patterns: "Name - Title - Company" or "Name - Title | Company"
  var segments = rawTitle.split(/\s*[-–|]\s*/).map(function(s) { return s.trim(); }).filter(Boolean);
  var name = segments[0] || "";
  var title = segments[1] || searchParams.role || "";
  var company = segments[2] || "";

  // Clean up the name — remove "Dr.", trailing letters, LinkedIn noise
  name = name.replace(/^(Dr\.?\s*|Mr\.?\s*|Ms\.?\s*)/i, "").trim();
  // If name is too long or looks like a title, try to fix
  if (name.length > 40) name = name.split(",")[0].trim();
  // If name is empty, derive from LinkedIn slug
  if (!name || name.length < 2) {
    var slug = url.replace(/.*\/in\//, "").replace(/\/$/, "").replace(/-/g, " ");
    name = slug.split(" ").map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(" ");
  }

  // Location extraction from rawTitle
  var locationFromTitle = "";
  var locPatterns = ["Gurgaon", "Gurugram", "Delhi", "Noida", "Mumbai", "Bangalore", "Bengaluru", "Hyderabad", "Pune", "Chennai", "Kolkata", "Ahmedabad", "Jaipur", "India"];
  locPatterns.forEach(function(loc) {
    if (rawTitle.toLowerCase().includes(loc.toLowerCase())) locationFromTitle = loc;
  });
  var location = locationFromTitle || (searchParams.location || "").split(",")[0].trim();

  // Score based on keyword matching
  var score = 3.0;
  var strengths = [];
  var allText = (rawTitle + " " + title).toLowerCase();
  var targetRole = (searchParams.role || "").toLowerCase();
  var targetIndustry = ((searchParams.industry || "").split("/")[0] || "").trim().toLowerCase();
  var targetMustHave = (searchParams.mustHave || searchParams.mustHaveSkills || "").toLowerCase();

  // Title match
  if (targetRole && allText.includes(targetRole)) { score += 0.8; strengths.push("Title match: " + searchParams.role); }
  // Partial title match (individual words)
  else {
    var roleWords = targetRole.split(/\s+/).filter(function(w) { return w.length > 3; });
    var matchedWords = roleWords.filter(function(w) { return allText.includes(w); });
    if (matchedWords.length >= 2) { score += 0.5; strengths.push("Partial title match: " + matchedWords.join(", ")); }
  }

  // Industry match
  if (targetIndustry && allText.includes(targetIndustry)) { score += 0.4; strengths.push("Industry: " + targetIndustry); }

  // Must-have skills match
  if (targetMustHave) {
    var skillTokens = targetMustHave.split(",").map(function(s) { return s.trim().toLowerCase(); }).filter(Boolean);
    var matchedSkills = skillTokens.filter(function(sk) { return allText.includes(sk); });
    if (matchedSkills.length > 0) { score += 0.3 * Math.min(matchedSkills.length, 3); strengths.push("Skills: " + matchedSkills.join(", ")); }
  }

  // Location match
  if (locationFromTitle) { score += 0.3; strengths.push("Location: " + locationFromTitle); }

  score = Math.min(score, 5.0);
  score = Math.round(score * 100) / 100;
  if (strengths.length === 0) strengths.push("Found via X-Ray search");

  var rating = score >= 4.0 ? "STRONG_FIT" : score >= 3.3 ? "GOOD_FIT" : "PARTIAL_FIT";
  var skills = (searchParams.mustHave || searchParams.mustHaveSkills || "").split(",").map(function(s) { return s.trim(); }).filter(Boolean).slice(0, 5);
  if (skills.length === 0) skills = [searchParams.role || "General"];

  return {
    id: searchId + index + Math.floor(Math.random() * 100000),
    _searchId: searchId,
    name: name,
    title: title,
    company: company,
    location: location,
    experience: "—",
    industry: searchParams.industry || "—",
    score: score,
    rating: rating,
    skills: skills,
    email: "Enrichment needed",
    phone: "Enrichment needed",
    source: "X-Ray / Google",
    linkedin: url,
    linkedinDirect: url,
    sourceLinks: {
      linkedin: url,
      linkedinDirect: url,
      google: "https://www.google.com/search?q=" + encodeURIComponent('"' + name + '" "' + (searchParams.role || "") + '"')
    },
    strengths: strengths,
    concerns: ["Verify profile — enrichment needed"],
    outreach: "Your profile appeared in our search for " + (searchParams.role || "this role") + " in " + location + " — we'd love to connect.",
    scores: {
      role: allText.includes(targetRole) ? 5 : 3,
      skills: 3,
      industry: targetIndustry && allText.includes(targetIndustry) ? 4 : 3,
      company: 3,
      trajectory: 3,
      location: locationFromTitle ? 5 : 3,
      comp: 3,
      stability: 3
    },
    lastAction: "Not reviewed",
    lastActionTime: Date.now(),
    _experienceData: buildExperienceFromSnippet(null, title, company)
  };
}

// Deduplicate candidates: skip if LinkedIn URL already exists in the pipeline
function deduplicateCandidates(newCandidates, existingCandidates) {
  var existingUrls = {};
  existingCandidates.forEach(function(c) {
    var url = (c.linkedin || c.linkedinDirect || "").toLowerCase().replace(/\/$/, "");
    if (url) existingUrls[url] = true;
  });

  var imported = [];
  var duplicates = [];

  newCandidates.forEach(function(c) {
    var url = (c.linkedin || c.linkedinDirect || "").toLowerCase().replace(/\/$/, "");
    if (url && existingUrls[url]) {
      duplicates.push(c);
    } else {
      imported.push(c);
      if (url) existingUrls[url] = true; // prevent intra-batch dupes too
    }
  });

  return { imported: imported, duplicates: duplicates };
}

// Full ingest pipeline: scrape → parse → deduplicate → return results
async function ingestGoogleXRay(searchParams, searchId, existingCandidates, progressCallback) {
  var role = searchParams.role || "Head of Sales";
  var location = (searchParams.location || "India").split(",")[0].trim();
  var industry = (searchParams.industry || "SaaS").split("/")[0].trim();
  var mustHave = searchParams.mustHave || searchParams.mustHaveSkills || "";

  // Build 2-3 X-Ray queries for maximum coverage
  var queries = [
    'site:linkedin.com/in/ "' + role + '" "' + industry + '" "' + location + '"',
    'site:linkedin.com/in/ "' + role + '" "' + location + '"'
  ];
  // Add a skills-focused query if skills provided
  var topSkill = mustHave.split(",")[0].trim();
  if (topSkill && topSkill.length > 2) {
    queries.push('site:linkedin.com/in/ "' + role + '" "' + topSkill + '" "' + location + '"');
  }

  var allRawProfiles = [];
  var seenUrls = {};

  for (var qi = 0; qi < queries.length; qi++) {
    if (progressCallback) progressCallback("Scraping X-Ray query " + (qi + 1) + "/" + queries.length + "...");
    try {
      var profiles = await scrapeGoogleXRay(queries[qi], progressCallback);
      profiles.forEach(function(p) {
        var clean = (p.url || "").toLowerCase().replace(/\/$/, "");
        if (clean && !seenUrls[clean]) {
          seenUrls[clean] = true;
          allRawProfiles.push(p);
        }
      });
    } catch(e) {
      console.warn("X-Ray query " + (qi + 1) + " failed:", e);
    }
    // Small delay between queries to avoid rate limiting
    if (qi < queries.length - 1) {
      await new Promise(function(r) { setTimeout(r, 2000); });
    }
  }

  if (progressCallback) progressCallback("Parsing " + allRawProfiles.length + " LinkedIn profiles...");

  // Parse each profile into a candidate object
  var parsedCandidates = allRawProfiles.map(function(p, idx) {
    return parseGoogleProfileToCandidate(p, searchParams, searchId, idx);
  });

  // Filter out profiles with empty names or clearly invalid entries
  parsedCandidates = parsedCandidates.filter(function(c) {
    return c.name && c.name.length > 1 && c.linkedin && c.linkedin.includes("/in/");
  });

  // Deduplicate against existing pipeline
  if (progressCallback) progressCallback("Deduplicating against existing pipeline...");
  var deduped = deduplicateCandidates(parsedCandidates, existingCandidates);

  // Sort by score descending
  deduped.imported.sort(function(a, b) { return b.score - a.score; });

  // Enrich top candidates with LinkedIn experience data (scrape up to 5 profiles)
  if (progressCallback) progressCallback("Enriching top candidates with experience data...");
  var enrichLimit = Math.min(deduped.imported.length, 5);
  for (var ei = 0; ei < enrichLimit; ei++) {
    try {
      var enrichResult = await scrapeLinkedInExperience(deduped.imported[ei].linkedin);
      if (enrichResult && enrichResult.experience) {
        deduped.imported[ei]._experienceData = enrichResult.experience;
        deduped.imported[ei].experience = enrichResult.experience.shortFormatted;
        deduped.imported[ei]._experienceRoles = enrichResult.roles;
      }
    } catch(enrichErr) { /* scraping failed, keep existing experience */ }
  }

  return {
    candidates: deduped.imported,
    duplicates: deduped.duplicates,
    totalScraped: allRawProfiles.length
  };
}

// ── LinkedIn Search Text Parser — paste raw LinkedIn search results text ──
function parseLinkedInSearchText(rawText, searchParams, searchId) {
  // Split by profile pattern: "Name • 1st/2nd/3rd+"
  var blocks = rawText.split(/(?=\n?[A-Z][a-zA-Z\s\.\-]+(?:\u00B7|\u2022|\xB7|\·)\s*(?:1st|2nd|3rd\+?))/);
  var candidates = [];
  var idCounter = 0;
  blocks.forEach(function(block) {
    block = block.trim();
    if (block.length < 20) return;
    // Extract name (first line before bullet/dot separator)
    var nameMatch = block.match(/^([A-Z][a-zA-Z\s\.\-]+?)(?:\s*[\u00B7\u2022\xB7\·]\s*(?:1st|2nd|3rd\+?))/);
    if (!nameMatch) return;
    var name = nameMatch[1].trim();
    if (name.length < 3 || name.length > 50) return;
    // Extract title (line after name, before location)
    var lines = block.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l.length > 0; });
    var title = lines.length > 1 ? lines[1] : "";
    // Extract location (look for "City, State, Country" pattern)
    var location = "";
    var locationMatch = block.match(/([A-Z][a-zA-Z\s]+,\s*(?:Haryana|Delhi|Uttar Pradesh|Maharashtra|Karnataka|Tamil Nadu|Telangana|Gujarat|Rajasthan|Punjab|West Bengal|Bihar|Madhya Pradesh|Kerala|Andhra Pradesh|Assam|Odisha|Jharkhand|Chhattisgarh|Goa|Uttarakhand|Himachal Pradesh|Jammu and Kashmir|Manipur|Meghalaya|Mizoram|Nagaland|Sikkim|Tripura|Arunachal Pradesh|Ontario|California|New York|Texas|London|Paris|Singapore|Dubai|UAE|India)[,\s]*(?:India|USA|UK|Canada|Singapore|UAE|France|Germany|Australia)?)/i);
    if (locationMatch) location = locationMatch[1].trim();
    // Extract company from "Current:" line
    var company = "";
    var currentMatch = block.match(/Current:\s*(.+?)(?:\s+at\s+(.+?))?(?:\n|$)/);
    if (currentMatch) {
      company = currentMatch[2] || currentMatch[1];
      if (!title && currentMatch[1]) title = currentMatch[1];
    }
    // Skip if we couldn't extract enough data
    if (!name || (!title && !company)) return;
    // Clean up title
    title = title.replace(/[\u00B7\u2022\xB7\·]\s*(?:1st|2nd|3rd\+?)$/, "").trim();
    if (title.length > 120) title = title.substring(0, 120) + "...";
    idCounter++;
    var candidateId = searchId + "_li" + idCounter;
    // Score based on title/role match
    var roleWords = (searchParams.role || "").toLowerCase().split(/\s+/);
    var titleLower = (title + " " + company).toLowerCase();
    var roleScore = 0;
    roleWords.forEach(function(w) { if (w.length > 2 && titleLower.includes(w)) roleScore += 0.5; });
    var baseScore = Math.min(4.5, 3.0 + roleScore);
    if (titleLower.includes("chro") || titleLower.includes("chief")) baseScore = Math.min(4.8, baseScore + 0.5);
    if (titleLower.includes("head") || titleLower.includes("vp") || titleLower.includes("director")) baseScore = Math.min(4.6, baseScore + 0.3);
    baseScore = Math.round(baseScore * 100) / 100;
    var rating = baseScore >= 4.0 ? "STRONG_FIT" : baseScore >= 3.5 ? "GOOD_FIT" : "PARTIAL_FIT";
    // Extract skills from title
    var skills = title.split(/[|,\u00B7\u2022]/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 2 && s.length < 40; }).slice(0, 6);
    if (skills.length === 0) skills = [title.split(/\s+/).slice(0, 3).join(" ")];
    candidates.push({
      id: candidateId,
      _searchId: searchId,
      name: name,
      title: title,
      company: company || "See LinkedIn",
      location: location || "India",
      experience: "\u2014",
      industry: searchParams.industry || "General",
      score: baseScore,
      rating: rating,
      skills: skills,
      email: "Enrichment needed",
      phone: "Enrichment needed",
      source: "LinkedIn Search (Pasted)",
      linkedin: "",
      linkedinDirect: "",
      sourceLinks: { linkedin: "", google: "https://www.google.com/search?q=" + encodeURIComponent('"' + name + '" "' + (company || title) + '"') },
      strengths: ["Sourced from LinkedIn People search", location ? location + " based" : "Location pending", title],
      concerns: ["LinkedIn URL not captured \u2014 manual verification needed"],
      outreach: "Your profile as " + title + " caught our attention in our search for " + (searchParams.role || "this role") + ".",
      scores: { role: Math.min(5, Math.round(baseScore)), skills: 4, industry: 3, company: 4, trajectory: 4, location: location.toLowerCase().includes("gurgaon") || location.toLowerCase().includes("gurugram") || location.toLowerCase().includes("delhi") ? 5 : 3, comp: 4, stability: 4 }
    });
  });
  return candidates;
}

  // Find which domain keywords the target search mentions

  } else if (domainHits >= 1 || titleHits >= 2) {

  } else if (titleHits >= 1) {
    signals.domain.rating = "Moderate";
    signals.domain.reason = "Some role keyword overlap but different industry";
  } else {
    signals.domain.rating = "Weak";
    signals.domain.reason = "No domain overlap with " + (targetDomains.length > 0 ? targetDomains.join("/") : "target industry");
  }

  // ── Signal 2: Location / Availability ──
  var targetLocation = (searchParams.location || "").toLowerCase();

  var candidateCity = candidateLocation.split(",")[0].trim().replace(/\s+/g, " ");

  var isTargetNCR = ncrCities.some(function(c) { return targetLocation.includes(c); });
  var isCandidateNCR = ncrCities.some(function(c) { return candidateLocation.includes(c); });

  var isTargetMumbai = mumbaiCities.some(function(c) { return targetLocation.includes(c); });
  var isCandidateMumbai = mumbaiCities.some(function(c) { return candidateLocation.includes(c); });

  if (candidateCity === targetCity || (isTargetNCR && isCandidateNCR) || (isTargetBangalore && isCandidateBangalore) || (isTargetMumbai && isCandidateMumbai)) {
    signals.location.rating = "Strong";
    signals.location.reason = "Exact location match: " + (candidate.location || "same city");
  } else if (candidateLocation.includes("india") && targetLocation.includes("india")) {
    signals.location.rating = "Moderate";
    signals.location.reason = "Same country, different city (" + (candidateCity || "India") + ")";
  } else if (candidateLocation.includes("remote") || candidateText.includes("remote") || candidateText.includes("open to relocation")) {

    signals.location.reason = "Remote-friendly or open to relocation";
  } else if (!candidateLocation || candidateLocation === "india") {
    signals.location.rating = "Moderate";
    signals.location.reason = "Location not specified — needs verification";
  } else {
    signals.location.rating = "Weak";

  // ── Signal 3: Seniority vs Role Fit ──
  var targetTitle = (searchParams.role || "").toLowerCase();

  function detectTier(titleStr) {
    var tiers = ["C-Suite","VP","Director","Manager","IC"];
    for (var ti = 0; ti < tiers.length; ti++) {
      var tier = tiers[ti];
      var keywords = SENIORITY_TIERS[tier];
      for (var ki = 0; ki < keywords.length; ki++) {
        if (titleStr.includes(keywords[ki])) return { tier: tier, level: ti };
      }
    }
    return { tier: "Unknown", level: -1 };
  }

  var targetTier = detectTier(targetTitle);
  var candidateTier = detectTier(candidateTitleLower);

  if (candidateTier.level === -1 || targetTier.level === -1) {
    signals.seniority.rating = "Moderate";
    signals.seniority.reason = "Seniority unclear — manual review needed (candidate: " + (candidateTier.tier) + ")";
  } else {
    var levelDiff = Math.abs(candidateTier.level - targetTier.level);
    if (levelDiff === 0) {
      signals.seniority.rating = "Strong";
      signals.seniority.reason = "Exact level match: " + candidateTier.tier + " \u2192 " + targetTier.tier;
    } else if (levelDiff === 1) {
      var direction = candidateTier.level > targetTier.level ? "growing into" : "stepping down to";
      signals.seniority.rating = "Moderate";
      signals.seniority.reason = candidateTier.tier + " " + direction + " " + targetTier.tier + " role";
    } else {
      signals.seniority.rating = "Weak";
      signals.seniority.reason = "Level gap: " + candidateTier.tier + " vs " + targetTier.tier + " (" + levelDiff + " levels off)";
    }
  }

  // ── Overall Fit: weakest link logic ──
  var ratingOrder = { "Strong": 3, "Moderate": 2, "Weak": 1 };
  var lowestRating = "Strong";
  ["domain","location","seniority"].forEach(function(key) {
    if (ratingOrder[signals[key].rating] < ratingOrder[lowestRating]) {
      lowestRating = signals[key].rating;
    }
  });

  return {
    signals: signals,
    overallFit: lowestRating + " Fit"
  };
}

// Uniqueness: each search uses its own searchId to tag candidates, ensuring no overlap
var _globalSearchCounter = 0;

// Parse experience string like "6-7 years" into { min: 6, max: 7 }
function parseExperienceRange(expStr) {
  if (!expStr) return null;
  var m = expStr.match(/(\d+)\s*[-–to]+\s*(\d+)/);
  if (m) return { min: parseInt(m[1]), max: parseInt(m[2]) };
  var m2 = expStr.match(/(\d+)\+?\s*(?:yr|year)?/i);
  if (m2) return { min: parseInt(m2[1]), max: parseInt(m2[1]) + 2 };
  return null;
}

// Check if candidate experience (years) is within ±1 year of target range
function experienceMatches(candidateYears, targetRange) {
  if (!targetRange || !candidateYears) return true; // pass if we can't verify
  var yrs = parseInt(candidateYears);
  if (isNaN(yrs)) return true;
  return yrs >= (targetRange.min - 1) && yrs <= (targetRange.max + 1);
}

// Extract years of experience from snippet text
function extractExperienceYears(snippet) {
  if (!snippet) return null;
  // Patterns: "12+ years", "8 years experience", "6-7 yrs", "Experience: 10 years"
  var patterns = [
    /(\d+)\+?\s*(?:years?|yrs?)\s*(?:of\s*)?(?:experience|exp)/i,
    /experience[:\s]*(\d+)\+?\s*(?:years?|yrs?)/i,
    /(\d+)\+?\s*(?:years?|yrs?)\s*(?:in|of|at)/i,
    /(\d+)\+?\s*(?:years?|yrs?)/i
  ];
  for (var i = 0; i < patterns.length; i++) {
    var m = snippet.match(patterns[i]);
    if (m) return parseInt(m[1]);
  }
  return null;
}

function buildLinkedInBooleans(searchParams) {
  var role = searchParams.role || "";
  var industry = (searchParams.industry || "").split("/")[0].trim();
  var location = (searchParams.location || "").split(",")[0].trim();
  var skills = (searchParams.mustHave || searchParams.mustHaveSkills || "").split(",").map(function(s){return s.trim();}).filter(Boolean);
  var topSkills = skills.slice(0, 2).join(" OR ");

  // Generate 2 focused boolean strings for LinkedIn search bar
  var booleans = [];

  // Boolean 1: Role + Industry + Location (broad)
  var b1Parts = [];
  if (role) b1Parts.push('"' + role + '"');
  if (industry) b1Parts.push('"' + industry + '"');
  if (location) b1Parts.push('"' + location + '"');
  if (b1Parts.length > 0) booleans.push(b1Parts.join(" AND "));

  // Boolean 2: Role variations + Skills (deep)
  var roleWords = role.split(" ");
  var roleAlt = roleWords.length > 2 ? '"' + role + '" OR "' + roleWords.slice(1).join(" ") + '"' : '"' + role + '"';
  var b2 = roleAlt;
  if (topSkills) b2 += " AND (" + topSkills + ")";
  booleans.push(b2);

  return booleans;
}

// MAIN APP
// ═══════════════════════════════════════════════════
function HiringRadarApp() {
  var hashTab = window.location.hash.replace("#","").toLowerCase();
  var validTabs = ["dashboard","candidates","kanban","search","outreach","market"];
  const [tab, setTab] = useState(validTabs.indexOf(hashTab) !== -1 ? hashTab : "dashboard");
  const [expandedId, setExpandedId] = useState(null);
  const [filterRating, setFilterRating] = useState("ALL");
  const [searchQuery, setSearchQuery] = useState("");
  const [chatOpen, setChatOpen] = useState(true);
  const [showNewSearch, setShowNewSearch] = useState(false);
  const [candidateNotes, setCandidateNotes] = useState({});
  const [refreshing, setRefreshing] = useState(false);
  const [searchProgress, setSearchProgress] = useState("");
  const [showSettings, setShowSettings] = useState(false);
  const [serperApiKey, setSerperApiKey] = useState(function() { try { return localStorage.getItem("hireintel_serper_key") || ""; } catch(e) { return ""; } });
  const saveApiKey = function(key) { setSerperApiKey(key); try { localStorage.setItem("hireintel_serper_key", key); } catch(e) {} };
  const [lastRefresh, setLastRefresh] = useState("Just now");
  const [toasts, setToasts] = useState([]);
  var showToast = function(message, type) {
    var id = Date.now() + Math.random();
    setToasts(function(prev) { return prev.concat([{ id: id, message: message, type: type || "info", exiting: false }]); });
    setTimeout(function() {
      setToasts(function(prev) { return prev.map(function(t) { return t.id === id ? Object.assign({}, t, { exiting: true }) : t; }); });
      setTimeout(function() {
        setToasts(function(prev) { return prev.filter(function(t) { return t.id !== id; }); });
      }, 400);
    }, 5000);
  };
  const [viewStatuses, setViewStatuses] = useState({});
  const markViewed = function(candidateId) {
    setViewStatuses(function(prev) {
      var next = Object.assign({}, prev);
      next[candidateId] = prev[candidateId] === "viewed" ? "fresh" : "viewed";
      return next;
    });
  };

  // ── Deep clone helper (strips functions/_experienceData circular refs) ──
  var deepCloneCandidates = function(cands) {
    return cands.map(function(c) { return Object.assign({}, c); });
  };

  // ── localStorage helpers ──
  var STORAGE_KEY = "hireintel_searches";
  var saveSearchesToStorage = function(searches) {
    try {
      var serializable = searches.map(function(s) {
        return Object.assign({}, s, {
          candidates: deepCloneCandidates(s.candidates || [])
        });
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
    } catch(e) { console.warn("localStorage save failed:", e); }
  };
  var loadSearchesFromStorage = function() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) {
        // Re-enrich experience data for loaded candidates
        parsed.forEach(function(s) {
          if (s.candidates) enrichCandidatesWithExperience(s.candidates);
        });
        return parsed;
      }
    } catch(e) { console.warn("localStorage load failed:", e); }
    return null;
  };

  // ── Initialize from localStorage or defaults ──
  var storedSearches = loadSearchesFromStorage();
  var defaultSearch = {
    id: "search_headofsales_1710001234",
    date: "2026-03-17",
    role: "Head of Sales",
    company: "TheHireHub.AI",
    location: "Gurgaon, India",
    experience: "6-7 years",
    industry: "SaaS / AI / HR Tech",
    status: "Active",
    candidates: deepCloneCandidates(INITIAL_CANDIDATES),
    searchStrings: INITIAL_SEARCH_STRINGS.slice(),
    params: {
      role: "Head of Sales",
      company: "TheHireHub.AI",
      location: "Gurgaon, India",
      experience: "6-7 years",
      industry: "SaaS / AI / HR Tech",
      mustHave: "B2B SaaS Sales, Revenue Growth, GTM Strategy, Team Building",
      niceToHave: "AI/HR Tech domain, Ecosystem-led sales",
      benchmark: "Debdeep Nandy — Manager Enterprise Sales, SaaS Labs",
      priceBand: "\u20B925L-40L CTC + equity",
      scope: "India"
    }
  };
  var initialSearches = storedSearches || [defaultSearch];
  var initialActiveId = (function() {
    var active = initialSearches.find(function(s) { return s.status === "Active"; });
    return active ? active.id : initialSearches[0].id;
  })();
  var initialActiveCands = (function() {
    var active = initialSearches.find(function(s) { return s.id === initialActiveId; });
    return active ? deepCloneCandidates(active.candidates || []) : deepCloneCandidates(INITIAL_CANDIDATES);
  })();
  var initialActiveStrings = (function() {
    var active = initialSearches.find(function(s) { return s.id === initialActiveId; });
    return active && active.searchStrings ? active.searchStrings.slice() : INITIAL_SEARCH_STRINGS.slice();
  })();

  // Dynamic candidates + search history
  const [activeCandidates, setActiveCandidates] = useState(initialActiveCands);
  const [activeSearchStrings, setActiveSearchStrings] = useState(initialActiveStrings);
  const [activeSearchId, setActiveSearchId] = useState(initialActiveId);
  const [searchHistory, setSearchHistory] = useState(initialSearches);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [showPasteModal, setShowPasteModal] = useState(false);
  const [pasteText, setPasteText] = useState("");

  // ── Persist searchHistory to localStorage on every change ──
  useEffect(function() {
    saveSearchesToStorage(searchHistory);
  }, [searchHistory]);

  // ── Helper: sync active candidates into searchHistory for the active search ──
  var syncActiveToHistory = function(candidates) {
    setSearchHistory(function(prev) {
      return prev.map(function(s) {
        if (s.id === activeSearchId) {
          return Object.assign({}, s, { candidates: deepCloneCandidates(candidates) });
        }
        return s;
      });
    });
  };

  // ── Delete a search from history ──
  var deleteSearch = function(searchId) {
    setSearchHistory(function(prev) {
      var filtered = prev.filter(function(s) { return s.id !== searchId; });
      // If we deleted the active search, switch to the first remaining one
      if (searchId === activeSearchId && filtered.length > 0) {
        var newActive = filtered[0];
        setActiveCandidates(deepCloneCandidates(newActive.candidates || []));
        setActiveSearchStrings(newActive.searchStrings ? newActive.searchStrings.slice() : []);
        setActiveSearchId(newActive.id);
        setSearchParams(newActive.params || {});
        filtered = filtered.map(function(s, idx) {
          return Object.assign({}, s, { status: idx === 0 ? "Active" : "Saved" });
        });
      }
      return filtered;
    });
    setDeleteConfirm(null);
    showToast("Search deleted", "info");
  };

  // ── Cross-search dedup: find which other searches contain a candidate ──
  var getCrossSearchBadges = function(candidateLinkedin) {
    if (!candidateLinkedin) return [];
    var normalized = candidateLinkedin.toLowerCase().replace(/\/+$/, "");
    var badges = [];
    searchHistory.forEach(function(s) {
      if (s.id === activeSearchId) return; // skip current
      var found = (s.candidates || []).some(function(c) {
        return c.linkedin && c.linkedin.toLowerCase().replace(/\/+$/, "") === normalized;
      });
      if (found) badges.push(s.role || "Other Search");
    });
    return badges;
  };

  // Load a search from history
  const loadSearch = function(searchId) {
    // First, save current active candidates into the current search before switching
    syncActiveToHistory(activeCandidates);
    var search = searchHistory.find(function(s) { return s.id === searchId; });
    if (!search) return;
    // Deep clone to prevent reference sharing
    setActiveCandidates(deepCloneCandidates(search.candidates || []));
    setActiveSearchStrings(search.searchStrings ? search.searchStrings.slice() : []);
    setActiveSearchId(searchId);
    setSearchParams(search.params || {});
    setSearchHistory(function(prev) {
      return prev.map(function(s) {
        return Object.assign({}, s, { status: s.id === searchId ? "Active" : "Saved" });
      });
    });
    setTab("candidates");
    setExpandedId(null);
    setFilterRating("ALL");
    setSearchQuery("");
  };

  // Notes handler
  const addNote = (candidateId, text, tag = "General") => {
    setCandidateNotes(prev => {
      const existing = prev[candidateId] || [];
      const now = new Date();
      const timeStr = now.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit"
      }) + " · " + now.toLocaleDateString("en-US", {
        month: "short",
        day: "numeric"
      });
      return {
        ...prev,
        [candidateId]: [...existing, {
          author: "Soumya",
          text,
          tag,
          time: timeStr
        }]
      };
    });
  };

  // Score edit handler — update a candidate's score from chart
  const handleScoreChange = function(candidateId, newScore) {
    var newRating = newScore >= 4.0 ? "STRONG_FIT" : newScore >= 3.5 ? "GOOD_FIT" : "PARTIAL_FIT";
    setActiveCandidates(function(prev) {
      var updated = prev.map(function(c) {
        if (c.id === candidateId) return Object.assign({}, c, { score: newScore, rating: newRating });
        return c;
      }).sort(function(a,b) { return b.score - a.score; });
      // Sync to history with deep clone
      syncActiveToHistory(updated);
      return updated;
    });
  };

  // Refresh handler — regenerates candidates for active search
  const handleRefresh = function() {
    setRefreshing(true);
    setTimeout(function() {
      var refreshCandidates = getPreScrapedCandidates(searchParams);
      if (refreshCandidates.length === 0) refreshCandidates = REAL_LINKEDIN_CANDIDATES.slice();
      var newCandidates = deepCloneCandidates(refreshCandidates.sort(function(a,b){return b.score - a.score;}));
      var newStrings = generateSearchStrings(searchParams);
      setActiveCandidates(newCandidates);
      setActiveSearchStrings(newStrings);
      // Sync to history with deep clone
      syncActiveToHistory(newCandidates);
      setRefreshing(false);
      var now = new Date();
      setLastRefresh(now.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit"
      }));
    }, 2500);
  };

  // Export as CSV
  const exportCSV = () => {
    const headers = ["Rank", "Name", "Title", "Company", "Location", "Experience", "Industry", "Score", "Rating", "Email", "Phone", "LinkedIn", "Strengths", "Concerns"];
    const rows = activeCandidates.map((c, i) => [i + 1, c.name, c.title, c.company, c.location, c.experience, c.industry, c.score, c.rating.replace(/_/g, " "), c.email, c.phone, c.linkedin, c.strengths.join("; "), c.concerns.join("; ")]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {
      type: "text/csv"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `HiringRadar_${searchParams.role.replace(/\s/g, "_")}_${searchParams.company}_Export.csv`;
    a.click();
  };

  // Export search strings
  const exportSearchStrings = () => {
    const text = activeSearchStrings.map(s => `[${s.platform}] (${s.region} — ${s.type})\n${s.query}`).join("\n\n");
    const blob = new Blob([text], {
      type: "text/plain"
    });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `HiringRadar_SearchStrings_${searchParams.role.replace(/\s/g, "_")}.txt`;
    a.click();
  };

  // Export full report as JSON
  const exportJSON = () => {
    const report = {
      searchParams,
      candidates: activeCandidates,
      searchStrings: activeSearchStrings,
      notes: candidateNotes,
      exportDate: new Date().toISOString(),
      summary: {
        total: activeCandidates.length,
        strong: activeCandidates.filter(c => c.rating === "STRONG_FIT").length,
        good: activeCandidates.filter(c => c.rating === "GOOD_FIT").length,
        partial: activeCandidates.filter(c => c.rating === "PARTIAL_FIT").length
